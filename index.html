<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./main.css">
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
    <link href="node_modules/gridstack/dist/gridstack.min.css" rel="stylesheet" />
    <script src="node_modules/gridstack/dist/gridstack-all.js"></script>
</head>

<body class="dark">
  <div id="grid" class="grid-stack light themed-base"></div>
  <plot-creator plot-types='["timeseries", "scatter", "heatmap"]'></plot-creator>
  <config-modal plot-types='{"timeseries": {"form": "timeseries-form", "plot": "timeseries-plot"}, "scatter": {"form": "scatter-form", "plot": "scatter-plot"}, "heatmap": {"form": "heatmap-form", "plot": "heatmap-plot"}}'></config-modal>
</body>
<script src="./utils.js"></script>
<script src="./config-modal.js"></script>
<script src="./timeseries/timeseries-form.js"></script>
<script src="./timeseries/timeseries-plot.js"></script>
<script type="module" src="./plot-timeseries.js"></script>
<script type="module" src="./plot-scatter.js"></script>
<script type="module" src="./plot-creator.js"></script>
<script type="module" src="./app.js"></script>

</html>
